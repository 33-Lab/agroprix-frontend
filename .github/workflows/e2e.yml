name: E2E Playwright

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily smoke against prod, 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  e2e:
    name: Playwright (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BASE_URL: ${{ vars.E2E_BASE_URL || 'https://app.agroprix.app' }}
      API_BASE: ${{ vars.E2E_API_BASE || 'https://web-production-46fb2.up.railway.app' }}
      FEDAPAY_SANDBOX_KEY: ${{ secrets.FEDAPAY_SANDBOX_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
